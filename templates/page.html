<!DOCTYPE html>
<html lang="en">
{{> head}}
<body class="{{bodyClass}}">
    {{> header}}

    <main class="site-main site-main--wide">
        <div class="container">
            <div class="row">
                <div class="col-med-9 page-article-wrapper">
                    {{#heroImage}}
                    <div class="hero-image">
                        <img src="{{heroImage}}" alt="{{title}}" class="img-100">
                    </div>
                    {{/heroImage}}
                    <div class="page-content">
                        {{content}}
                    </div>
                </div>

                {{> sidebar}}
            </div>
        </div>
    </main>

    {{> footer}}
</body>
</html>
